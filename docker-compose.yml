version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build: ./server
    ports:
      - "3001:3001"
    env_file: ./server/.env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules

  ai:
    build: ./ai
    ports:
      - "5001:5001"
    depends_on:
      - redis

volumes:
  mongo_data: